<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Agency Viz</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="av-header">
      <img src="logo.svg" alt="Agency Viz" class="av-logo" />
    </header>

    <main class="av-main">
      <div class="av-field">
        <label for="apiBase">API base URL</label>
        <input id="apiBase" type="text" placeholder="https://app.agencyviz.com" spellcheck="false" />
      </div>

      <div class="av-field">
        <label for="apiKey">API key</label>
        <input id="apiKey" type="password" placeholder="av_live_…" spellcheck="false" />
        <p class="av-hint">Generate one in Agency Viz → Settings → API Keys.</p>
      </div>

      <button id="save" class="av-btn-primary">Save settings</button>
      <div id="status" class="av-status"></div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
