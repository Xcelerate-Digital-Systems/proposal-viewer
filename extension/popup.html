<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Agency Viz</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="av-header">
      <img src="logo.svg" alt="Agency Viz" class="av-logo" />
    </header>

    <main class="av-main">
      <div id="signedOut" class="av-auth-state" hidden>
        <p class="av-hint">Connect this extension to your Agency Viz account.</p>
        <button id="signIn" class="av-btn-primary">Sign in with Agency Viz</button>
      </div>

      <div id="signedIn" class="av-auth-state" hidden>
        <p class="av-hint">
          Connected as <strong id="accountLabel">your account</strong>.
        </p>
        <button id="signOut" class="av-btn-secondary">Sign out</button>
      </div>

      <div id="status" class="av-status"></div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
